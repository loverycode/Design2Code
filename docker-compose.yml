version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: design2code-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: design2code_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    container_name: design2code-backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/design2code_db?schema=public"
      PORT: 3001
    ports:
      - "3002:3001"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
