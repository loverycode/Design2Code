<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-family: "Inter", sans-serif;
            --second-family: "Fugaz One", sans-serif;
            --third-family: "Tomorrow", sans-serif;
            --font3: "Helvetica Now Display", sans-serif;
            --primary-pink: #fe53ae;
            --primary-blue: #4ec0df;
            --error-red: #dc2626;
            --warning-orange: #f59e0b;
            --success-green: #10b981;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f9fafb;
            --border-color: #e8e8e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: #ffffff;
            padding: 20px;
            width: 100%;
            min-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Лейбл над кнопкой */
        .check-label {
            font-family: var(--font-family);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 4px;
            display: block;
        }

        #checkBtn {
            border-radius: 12px;
            width: 100%;
            height: 52px;
            background: var(--primary-pink);
            border: none;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        #checkBtn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #checkBtn:active {
            transform: translateY(0);
        }

        #checkBtn h3 {
            font-family: var(--font-family);
            font-weight: 500;
            font-size: 14px;
            color: white;
        }

        /* Заголовок "Результат проверки" */
        .result-title {
            font-family: var(--font-family);
            font-weight: 500;
            font-size: 13px;
            color: var(--text-dark);
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .main-content {
            background: #efefef;
            width: 100%;
            min-height: 100px;
            max-height: 250px;
            border-radius: 12px;
            padding: 12px;
            margin: 0;
            box-sizing: border-box;
            overflow-y:auto;
        }

        #results {
            max-height: 200px;
            overflow-y: auto;
            margin: 0;
            padding-right: 6px;
        }

        #results::-webkit-scrollbar {
            width: 4px;
        }

        #results::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 4px;
        }

        #results::-webkit-scrollbar-thumb {
            background: var(--primary-blue);
            border-radius: 4px;
        }

        .error {
            color: var(--error-red);
            padding: 8px 10px;
            margin: 8px 0;
            font-size: 12px;
            border-radius: 6px;
        }

        .warning {
            color: var(--warning-orange);
            background: rgba(245, 158, 11, 0.05);
            border-left: 3px solid var(--warning-orange);
            padding: 8px 10px;
            margin: 8px 0;
            font-size: 12px;
            border-radius: 6px;
        }

        .success {
            color: var(--success-green);
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            word-break: break-all;
        }

        .success a {
            color: #106ce4;
            text-decoration: underline;
        }

        .success a:hover {
            color: #0d5cc4;
        }

        #exportBtn {
            border-radius: 12px;
            width: 100%;
            height: 52px;
            background: var(--primary-blue);
            border: none;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 8px;
        }

        #exportBtn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #exportBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        #exportBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #exportBtn h3 {
            font-family: var(--font-family);
            font-weight: 500;
            font-size: 14px;
            color: white;
        }

        /* Подсказка — внизу плагина */
        .rules {
            font-family: var(--font-family);
            font-weight: 400;
            font-size: 11px;
            line-height: 140%;
            color: var(--text-light);
            padding: 12px;
            margin-top: 16px;
            background: #ffffff;
            border-top: 1px solid var(--border-color);
        }

        .rules strong {
            color: var(--text-dark);
        }

        /* Ссылка на проекты */
        .projects-link {
            text-align: left;
            margin: 12px 0 0 0;
            padding: 8px;
        }

        .projects-link a {
            font-family: var(--font-family);
            font-size: 12px;
            font-weight: 500;
            color: var(--primary-blue);
            text-decoration: none;
            gap: 6px;
        }

        .projects-link a:hover {
            color: var(--primary-pink);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <!-- Лейбл над кнопкой проверки -->
        <label class="check-label">*Выберите фрейм</label>
        <button id="checkBtn">
            <h3>Проверить структуру</h3>
        </button>

        <!-- Заголовок результата проверки -->
        <div class="result-title">Результат проверки</div>

        <!-- Блок с результатами -->
        <div class="main-content">
            <div id="results">
                <div class="success" style="display: none;" id="successMessage"></div>
            </div>
            <div id="projectsLink" class="projects-link" style="display: none;">
                <a href="http://localhost:3000" target="_blank">📁 Мои проекты</a>
            </div>
        </div>

        <!-- Кнопка экспорта -->
        <button id="exportBtn" disabled>
            <h3>Экспортировать</h3>
        </button>

        <!-- Подсказка внизу -->
        <div class="rules">
            <strong>💡 Подсказка</strong><br>
            • Используйте Auto Layout (Shift+A)<br>
            • Компоненты: PascalCase (BtnPrimary)<br>
            • Слои: kebab-case (hero-section)
        </div>
    </main>

    <script>
        const exportBtn = document.getElementById('exportBtn');
        const checkBtn = document.getElementById('checkBtn');
        const resultsDiv = document.getElementById('results');
        const projectLink = document.getElementById('projectsLink');
        
        function resizeUI(){
            const height = document.body.scrollHeight;
            parent.postMessage({pluginMessage: {type: 'resize', height: height}}, '*');
        }
        window.addEventListener('load', resizeUI);
        window.addEventListener('resize', resizeUI);
        const observer = new MutationObserver(resizeUI);
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });

        if (projectLink) {
            projectLink.style.display = 'none';
        }

        checkBtn.onclick = () => {
            parent.postMessage({ pluginMessage: { type: 'check' } }, '*');
        };

        exportBtn.onclick = () => {
            parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
        };

        window.onmessage = (event) => {
            const msg = event.data.pluginMessage;
            console.log('UI received - type:', msg?.type, 'shareUrl:', msg?.shareUrl, 'full msg:', msg);
            const container = document.getElementById('results');
            if (!container) return;

            if (msg?.type === 'validation-result') {
                const errors = msg.issues.filter(i => i.type === 'error');
                let html = '';

                if (errors.length) {
                    html += `<div style="margin-bottom: 6px; font-size: 12px;"> Ошибки (${errors.length})</div>`;
                    errors.forEach(e => {
                        html += `<div class="error">• ${e.message}<br><small>→ ${e.fix}</small></div>`;
                    });
                }

                if (errors.length === 0) {
                    html += '<div class="success">✅ Ошибок нет! Макет готов к экспорту.</div>';
                } 
                container.innerHTML = html;
                exportBtn.disabled = errors.length > 0;
                if (projectLink) {
                    projectLink.style.display = 'none';
                }
            }

            if (msg?.type === 'export-success') {
                const shareUrl = msg.shareUrl;
                if (shareUrl) {
                    container.innerHTML = `<div class="success">✅ Экспорт выполнен!</div>`;
                    exportBtn.disabled = false;
                    if (projectLink) {
                        projectLink.style.display = 'block';
                    }
                    resizeUI();
                } else {
                    container.innerHTML = `<div class="error">❌ Ошибка: ссылка не получена</div>`;
                }
            }

            if (msg?.type === 'error') {
                container.innerHTML = `<div class="error">❌ Ошибка: ${msg.message}</div>`;
                if (projectLink) {
                    projectLink.style.display = 'none';
                }
            }
        };
    </script>
</body>
</html>
